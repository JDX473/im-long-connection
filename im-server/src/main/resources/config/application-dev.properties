# IM Netty Server - Development Configuration

# Netty server
netty.server.port=9999

# Nacos service discovery (for gateway to find this node)
nacos.config.server-addr=127.0.0.1:8848
nacos.config.namespace=2cdfb8e3-f127-4020-93df-2d4c3dc805b5
nacos.config.group=DEFAULT_GROUP

# Redis (session registry + channel instance mapping)
redis.host=127.0.0.1
redis.port=6379
redis.database=6
redis.jedis.timeout=5000
redis.jedis.pool.max-active=100
redis.jedis.pool.max-wait=-1
redis.jedis.pool.min-idle=10

# RocketMQ (message routing)
rocketmq.name-server=121.4.119.166:9876
rocketmq.consumer.group.node=cg_web_chat_netty_node
rocketmq.consumer.group=cg_web_chat_netty
rocketmq.producer.group=pg_web_chat_netty
rocketmq.producer.send-message-timeout=10000
rocketmq.consumer.thread.max=50
rocketmq.consumer.thread.min=20
